services:
  - type: web
    name: pawneighbor-bp
    runtime: static
    buildCommand: echo "static site - no build"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /office
        destination: /virtual-office.html
      - type: rewrite
        source: /*
        destination: /index.html